<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started Now – Dayong</title>
  <meta name="description" content="Create your Dayong account and get started today. Sign up with email or continue with Google and Apple." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
    }

    /* ───── LAYOUT ───── */
    .page-wrapper {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    /* ───── LEFT – FORM PANEL ───── */
    .form-panel {
      flex: 0 0 44%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      background: #ffffff;
    }

    .form-container {
      width: 100%;
      max-width: 360px;
    }

    .form-title {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 36px;
      line-height: 1.2;
    }

    /* ───── FORM FIELDS ───── */
    .field-group {
      margin-bottom: 20px;
    }

    .field-group label {
      display: block;
      font-size: 13.5px;
      font-weight: 500;
      color: #111827;
      margin-bottom: 8px;
    }

    .field-group input[type="text"],
    .field-group input[type="email"],
    .field-group input[type="password"] {
      width: 100%;
      height: 44px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 13.5px;
      color: #374151;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .field-group input::placeholder {
      color: #9ca3af;
    }

    .field-group input:focus {
      border-color: #2d5742;
      box-shadow: 0 0 0 3px rgba(45, 87, 66, 0.12);
    }

    /* ───── TERMS CHECKBOX ───── */
    .terms-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 26px;
    }

    .terms-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #2d5742;
      cursor: pointer;
      flex-shrink: 0;
    }

    .terms-row label {
      font-size: 13px;
      color: #374151;
    }

    .terms-row label a {
      color: #374151;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ───── SIGNUP BUTTON ───── */
    .btn-signup {
      width: 100%;
      height: 48px;
      background: #3a6b4a;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
      transition: background 0.22s ease, transform 0.15s ease, box-shadow 0.22s ease;
    }

    .btn-signup:hover {
      background: #2d5740;
      box-shadow: 0 4px 14px rgba(45, 87, 66, 0.30);
      transform: translateY(-1px);
    }

    .btn-signup:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* ───── OR DIVIDER ───── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .or-divider span {
      font-size: 13px;
      color: #6b7280;
      white-space: nowrap;
    }

    /* ───── OAUTH BUTTONS ───── */
    .oauth-row {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }

    .btn-oauth {
      flex: 1;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      background: #ffffff;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-oauth:hover {
      background: #f9fafb;
      border-color: #9ca3af;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .btn-oauth img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    /* ───── SIGNIN LINK ───── */
    .signin-text {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
    }

    .signin-text a {
      color: #3b82f6;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }

    .signin-text a:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    /* ───── RIGHT – HERO PANEL ───── */
    .hero-panel {
      flex: 0 0 56%;
      position: relative;
      overflow: hidden;
      border-top-left-radius: 48px;
      border-bottom-left-radius: 48px;
      background: rgb(28, 100, 63);
    }

    /* Mask group PNG: transparent top (green bg shows through) + photo below */
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      z-index: 0;
    }

    /* Hero content hidden — PNG provides all visuals */
    .hero-content {
      display: none;
    }

    /* Social icon overlay removed — PNG provides all hero visuals */

    /* ───── LOGO ───── */
    .logo-wrapper {
      display: flex;
      align-items: center;
      margin-bottom: 48px;
    }

    .logo-img {
      width: 200px;
      height: auto;
    }

    /* ───── TAGLINE ───── */
    .hero-tagline {
      max-width: 280px;
      font-size: 14.5px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 32px;
    }

    /* ───── SOCIAL ICONS ───── */
    .social-icons {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #0f0f0f;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      text-decoration: none;
    }

    .social-btn:hover {
      background: #1c1c1c;
      transform: scale(1.08);
    }

    .social-btn svg {
      width: 17px;
      height: 17px;
      fill: #ffffff;
    }

    /* ───── ANIMATIONS ───── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-container { animation: fadeInUp 0.55s ease both; }
    .hero-content   { animation: fadeInUp 0.65s ease 0.1s both; }

    /* ───── RESPONSIVE ───── */
    @media (max-width: 900px) {
      .page-wrapper {
        flex-direction: column;
      }
      .form-panel {
        flex: none;
        padding: 48px 32px;
      }
      .hero-panel {
        flex: none;
        min-height: 380px;
        border-top-left-radius: 0;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- ═══════════════════════════ LEFT: FORM ═══════════════════════════ -->
  <section class="form-panel">
    <div class="form-container">

      <h1 class="form-title">Get Started Now</h1>

      <form id="signup-form" novalidate>

        <!-- Name -->
        <div class="field-group">
          <label for="name">Name</label>
          <input
            id="name"
            type="text"
            name="name"
            placeholder="Enter your name"
            autocomplete="name"
          />
        </div>

        <!-- Email -->
        <div class="field-group">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
        </div>

        <!-- Password -->
        <div class="field-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="new-password"
          />
        </div>

        <!-- Terms -->
        <div class="terms-row">
          <input id="terms" type="checkbox" name="terms" />
          <label for="terms">I agree to the <a href="#">terms &amp; policy</a></label>
        </div>

        <!-- Signup CTA -->
        <button type="submit" class="btn-signup" id="btn-signup">Signup</button>

      </form>

      <!-- OR Divider -->
      <div class="or-divider">
        <span>Or</span>
      </div>

      <!-- OAuth -->
      <div class="oauth-row">
        <button class="btn-oauth" id="btn-google" type="button">
          <img src="icons/icons8-google 1.png" alt="Google logo" />
          Sign in with Google
        </button>
        <button class="btn-oauth" id="btn-apple" type="button">
          <img src="icons/icons8-apple-logo 1.png" alt="Apple logo" />
          Sign in with Apple
        </button>
      </div>

      <!-- Sign In Link -->
      <p class="signin-text">
        Have an account?&nbsp;<a href="#" id="link-signin">Sign In</a>
      </p>

    </div>
  </section>

  <!-- ═══════════════════════════ RIGHT: HERO ═══════════════════════════ -->
  <section class="hero-panel">

    <!-- Mask group PNG: RGBA portrait image, transparent top shows green bg,
         photo bottom shows trees + rice terraces naturally -->
    <img
      class="hero-bg"
      src="login page/Mask group.png"
      alt="Lush green rice terraces"
    />

    <!-- Hidden content block (PNG provides all visuals) -->
    <div class="hero-content"></div>

  </section>

</div>

</body>
</html>
